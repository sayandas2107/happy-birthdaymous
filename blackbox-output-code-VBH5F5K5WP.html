<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday My Love</title>
    <!-- Importing Google Fonts for aesthetic typography -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* --- CSS STYLING --- */
        :root {
            --primary-pink: #ffb6c1;
            --soft-pink: #ffe6ea;
            --text-color: #5a3e46;
            --white: #ffffff;
            --accent-red: #e91e63;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #fff0f3 0%, #ffffff 100%);
            color: var(--text-color);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Falling Hearts Container */
        #hearts-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
            overflow: hidden;
        }

        .heart {
            position: absolute;
            color: var(--accent-red);
            font-size: 20px;
            animation: fall linear infinite;
            opacity: 0.8;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* Main Container */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.3);
            margin-top: 50px;
            margin-bottom: 50px;
        }

        /* Typography */
        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 4rem;
            color: var(--accent-red);
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        h2 {
            font-weight: 300;
            font-size: 1.5rem;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        /* Timer Section */
        .timer-box {
            background: var(--white);
            padding: 20px;
            border-radius: 15px;
            display: inline-block;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            margin-bottom: 50px;
            border: 1px solid var(--soft-pink);
        }

        .timer-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-red);
            margin-bottom: 15px;
        }

        #timer {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 1.2rem;
        }

        .time-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .time-val {
            font-size: 2rem;
            font-weight: 600;
            color: var(--accent-red);
        }

        .time-label {
            font-size: 0.7rem;
            color: #888;
        }

        /* Photo Gallery - Scrolling */
        .gallery-wrapper {
            width: 100%;
            overflow: hidden;
            border-radius: 15px;
            margin-bottom: 50px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .gallery-track {
            display: flex;
            width: 300%; /* Approx for smooth scroll interaction */
            animation: scroll 20s linear infinite;
        }

        /* If you want manual scrolling instead of animation, remove animation and add overflow-x: auto */
        
        .gallery-img {
            width: 100vw;
            height: 400px;
            object-fit: cover;
            flex-shrink: 0;
        }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-200vw); }
        }

        /* Placeholder logic for manual scroll on mobile, auto on desktop */
        @media (max-width: 768px) {
            .gallery-track {
                animation: none;
                width: 100%;
                overflow-x: scroll;
                -webkit-overflow-scrolling: touch;
                scroll-snap-type: x mandatory;
            }
            .gallery-img {
                width: 100%;
                height: 250px;
                scroll-snap-align: center;
            }
            /* Hide scrollbar */
            .gallery-wrapper::-webkit-scrollbar { display: none; }
            h1 { font-size: 3rem; }
        }

        /* Music Player */
        .music-player {
            background: linear-gradient(45deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            padding: 30px;
            border-radius: 20px;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .song-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 15px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        .controls {
            display: flex;
            gap: 20px;
        }

        .btn {
            background: white;
            color: var(--accent-red);
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            font-family: 'Poppins', sans-serif;
        }

        .btn:hover {
            transform: scale(1.1);
        }

        /* Message Section */
        .message {
            margin-top: 50px;
            font-size: 1.1rem;
            line-height: 1.8;
            color: #666;
        }

        footer {
            margin-top: 50px;
            font-size: 0.8rem;
            color: #aaa;
        }

    </style>
</head>
<body>

    <!-- Falling Hearts Canvas -->
    <div id="hearts-container"></div>

    <div class="container">
        <!-- Header -->
        <header>
            <h1>Happy Birthday to baccha </h1>
            <h2>To the most beautiful soul in my life i love you baccha❤️</h2>
        </header>

        <!-- Timer -->
        <div class="timer-section">
            <div class="timer-box">
                <div class="timer-title">Time We've Been Together</div>
                <div id="timer">
                    <div class="time-unit"><span class="time-val" id="days">000</span><span class="time-label">Days</span></div>
                    <div class="time-unit"><span class="time-val" id="hours">00</span><span class="time-label">Hours</span></div>
                    <div class="time-unit"><span class="time-val" id="minutes">00</span><span class="time-label">Mins</span></div>
                    <div class="time-unit"><span class="time-val" id="seconds">00</span><span class="time-label">Secs</span></div>
                </div>
            </div>
        </div>

        <!-- Moving Gallery -->
        <!-- TIP: Replace the src URLs below with actual photos of you two! -->
        <div class="gallery-wrapper">
            <div class="gallery-track">
                <img src="https://placehold.co/800x400/ffb6c1/ffffff?text=Our+First+Date" class="gallery-img" alt="Memory 1">
                <img src="https://placehold.co/800x400/e91e63/ffffff?text=Fun+Times" class="gallery-img" alt="Memory 2">
                <img src="https://placehold.co/800x400/ffccd5/ffffff?text=Trip+Together" class="gallery-img" alt="Memory 3">
                <!-- Duplicate the first image to create a smooth loop effect -->
                <img src="https://placehold.co/800x400/ffb6c1/ffffff?text=Our+First+Date" class="gallery-img" alt="Memory 1">
            </div>
        </div>

        <!-- Music Player -->
        <!-- TIP: Add your music file (e.g., love_song.mp3) to the source tag below -->
        <div class="music-player">
            <div class="song-title">🎵 Our Song</div>
            <div class="controls">
                <button class="btn" onclick="toggleMusic()">▶ Play</button>
                <!-- Hidden Audio Element -->
                <audio id="bgm-music" loop>
                    <source src="https://www.image2url.com/r2/default/audio/1779215676893-8d257530-f01f-42b6-88ea-3d26fb974879.mp3
                    Your browser does not support the audio element.
                </audio>
            </div>
            <div style="margin-top:10px; font-size: 0.8rem; opacity: 0.8;">(Click to play our favorite song)</div>
        </div>

        <!-- Message -->
        <div class="message">
            <p>Today is yours, just like you are my everything. <br>Thank you for being by my side. I love you more than words can say!</p>
        </div>

        <footer>
            Made with ❤️ by [mr das]
        </footer>
    </div>
